<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alex Howell</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }

    .wrap {
      max-width: 700px;
      padding: 40px;
    }

    img {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
      border: 2px solid rgba(255,255,255,0.15);
    }

    h1 {
      margin: 10px 0;
      font-size: 2.4rem;
    }

    p {
      opacity: 0.85;
      line-height: 1.6;
    }

    a {
      color: #7dd3fc;
      text-decoration: none;
      margin: 0 10px;
    }

    a:hover {
      text-decoration: underline;
    }

    .links {
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <img src="profile.jpg" alt="Profile Picture" />

    <h1>Your Name</h1>

    <p>
      Your bio goes here. Replace this with your real introduction.
    </p>

    <div class="links">
      <a href="#">GitHub</a>
      <a href="#">LinkedIn</a>
      <a href="#">Contact</a>
    </div>

  </div>
</body>
</html>
